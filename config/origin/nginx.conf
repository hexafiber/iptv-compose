worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Import map channel
    include /etc/nginx/conf.d/upstream_channels.map;

    # Fallback log
    log_format fallback_log '$remote_addr - $host - $uri - fallback_to_udpxy - $time_local - "$http_user_agent"';

    server {
        listen       80;
        server_name  _;

        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
            add_header Content-Length 2;
        }

        location / {
            proxy_intercept_errors on;
            proxy_pass $backend_stream;
            error_page 404 = @udpxy_fallback;
        }

        location @udpxy_fallback {
            access_log /var/log/nginx/iptv_fallback.log fallback_log;
            proxy_pass $udpxy_stream;
        }

        # Static HLS files (misal kalau ada HLS di /hls/)
        location /hls/ {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /hls/;
            try_files $uri =404;
        }
    }
}
