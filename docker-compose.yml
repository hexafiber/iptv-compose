services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./config/origin/nginx.conf:/etc/nginx/nginx.conf:ro
      - /tmp/ramdisk:/hls:ro
    ports:
      - "80:80"

  rcti:
    image: yuspynoza/rctiplus-go:latest
    restart: unless-stopped
    volumes:
      - /tmp/ramdisk:/hls
    command: -O /hls/rcti "http://rctiplus.hexafiber.net/rcti.m3u8"

  mnctv:
    image: yuspynoza/rctiplus-go:latest
    restart: unless-stopped
    volumes:
      - /tmp/ramdisk:/hls
    command: -O /hls/mnctv "http://rctiplus.hexafiber.net/mnctv.m3u8"

  gtv:
    image: yuspynoza/rctiplus-go:latest
    restart: unless-stopped
    volumes:
      - /tmp/ramdisk:/hls
    command: -O /hls/gtv "http://rctiplus.hexafiber.net/gtv.m3u8"

  inews:
    image: yuspynoza/rctiplus-go:latest
    restart: unless-stopped
    volumes:
      - /tmp/ramdisk:/hls
    command: -O /hls/inews "http://rctiplus.hexafiber.net/inews.m3u8"

  ffmpeg-kompastv:
    image: jrottenberg/ffmpeg:latest
    restart: unless-stopped
    volumes:
      - /tmp/ramdisk:/hls
    network_mode: "host"
    entrypoint: >
      /bin/sh -c "mkdir -p /hls/kompastv &&
      exec ffmpeg
      -hide_banner -loglevel warning
      -re -i 'udp://239.2.2.17:3000?buffer_size=2097152'
      -c:v copy
      -c:a aac -profile:a aac_low -b:a 64k -ar 32000 -ac 1
      -f hls
      -hls_time 2
      -hls_list_size 20
      -hls_flags delete_segments+append_list
      -hls_segment_filename /hls/kompastv/seg_%d.ts
      /hls/kompastv/index.m3u8"

  ffmpeg-sctv:
    image: jrottenberg/ffmpeg:latest
    restart: unless-stopped
    volumes:
      - /tmp/ramdisk:/hls
    network_mode: "host"
    entrypoint: >
      /bin/sh -c "mkdir -p /hls/sctv &&
      exec ffmpeg
      -hide_banner -loglevel warning
      -re -i 'udp://239.2.2.29:3000?buffer_size=2097152'
      -c:v copy
      -c:a aac -profile:a aac_low -b:a 64k -ar 32000 -ac 1
      -f hls
      -hls_time 2
      -hls_list_size 20
      -hls_flags delete_segments+append_list
      -hls_segment_filename /hls/sctv/seg_%d.ts
      /hls/sctv/index.m3u8"

  ffmpeg-trans7:
    image: jrottenberg/ffmpeg:latest
    restart: unless-stopped
    volumes:
      - /tmp/ramdisk:/hls
    network_mode: "host"
    entrypoint: >
      /bin/sh -c "mkdir -p /hls/trans7 &&
      exec ffmpeg
      -hide_banner -loglevel warning
      -re -i 'udp://239.2.2.11:3000?buffer_size=2097152'
      -c:v copy
      -c:a aac -profile:a aac_low -b:a 64k -ar 32000 -ac 1
      -f hls
      -hls_time 2
      -hls_list_size 20
      -hls_flags delete_segments+append_list
      -hls_segment_filename /hls/trans7/seg_%d.ts
      /hls/trans7/index.m3u8"

